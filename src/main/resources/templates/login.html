<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Attendance System</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3f37c9;
            --bg: #f0f2f5;
            --text: #2d3436;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .login-card h2 {
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 28px;
        }

        .login-card p {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        /* Container Input Password */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            padding-right: 45px; /* Beri ruang untuk ikon */
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-size: 15px;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        /* Tombol Ikon Mata */
        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            padding: 5px;
            cursor: pointer;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .error-msg {
            background-color: #ffeaa7;
            color: #d63031;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid #fab1a0;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #b2bec3;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>AttendanceApp</h2>
    <p>Silakan masuk ke akun Anda</p>

    <div th:if="${param.error}" class="error-msg">
        Username atau password salah!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Masukkan username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i id="eyeIcon" data-lucide="eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login">Masuk Sekarang</button>
    </form>

    <div class="footer-text">
        &copy; 2026 Attendance Pro System <br>
        v2.5 Stable
    </div>
</div>

<script>
    // Inisialisasi Ikon Lucide
    lucide.createIcons();

    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            // Ganti atribut ikon ke 'eye-off' (mata tercoret)
            eyeIcon.setAttribute("data-lucide", "eye-off");
        } else {
            passwordInput.type = "password";
            // Balikkan ke 'eye'
            eyeIcon.setAttribute("data-lucide", "eye");
        }

        // Re-render ikon Lucide setelah perubahan atribut
        lucide.createIcons();
    }
</script>
</body>
</html>
