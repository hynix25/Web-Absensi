<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pengguna | AttendancePro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --bg: #f8f9fc;
            --text: #2d3436;
            --admin-color: #1e293b; /* Biru gelap untuk admin */
            --user-color: #4361ee;  /* Biru terang untuk user */
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .navbar { background: white; padding: 15px 5%; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 90%; max-width: 800px; margin: 40px auto; }

        /* Profile Card */
        .profile-card {
            background: white; border-radius: 20px; padding: 40px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #edf2f7;
        }

        /* Avatar adaptif warna berdasarkan role */
        .avatar {
            width: 100px; height: 100px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 40px;
            font-weight: 700; margin: 0 auto 20px; color: white;
        }
        .avatar.admin-style { background: var(--admin-color); border: 4px solid #cbd5e1; }
        .avatar.user-style { background: var(--user-color); }

        /* Role Badge */
        .role-badge {
            display: inline-block; padding: 4px 15px; border-radius: 50px;
            font-size: 11px; font-weight: 800; letter-spacing: 1px; margin-top: 10px;
        }
        .badge-admin { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .badge-user { background: #dcfce7; color: #166534; border: 1px solid #4ade80; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; text-align: left; }
        .info-item { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .info-label { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 16px; font-weight: 600; color: var(--text); }

        /* Style khusus ID Admin */
        .id-admin { color: #e11d48; font-family: 'Courier New', monospace; }

        .history-section { margin-top: 40px; }
        .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .history-table th { background: #f1f5f9; padding: 12px; text-align: left; color: #64748b; font-size: 11px; }
        .history-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; display: inline-block; }
        .btn-back { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>

<nav class="navbar">
    <h2 style="margin:0; color: var(--primary); font-size: 20px;">AttendancePro</h2>
    <a href="/karyawan" class="btn btn-back"> ← Kembali</a>
</nav>

<div class="container">
    <div class="profile-card">
        <div class="avatar"
             th:classappend="${userRole.contains('ADMIN')} ? 'admin-style' : 'user-style'"
             th:text="${#strings.substring(user.nama,0,1)}">U</div>

        <h2 style="margin: 0;" th:text="${user.nama}">Nama User</h2>
        <p style="color: #94a3b8; margin: 5px 0 0;" th:text="${user.jabatan}">Jabatan</p>

        <div class="role-badge"
             th:classappend="${userRole.contains('ADMIN')} ? 'badge-admin' : 'badge-user'"
             th:text="${userRole}">ROLE</div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">ID Identitas</div>
                <div class="info-value"
                     th:classappend="${userRole.contains('ADMIN')} ? 'id-admin' : ''"
                     th:text="${displayId}">ID</div>
            </div>
            <div class="info-item">
                <div class="info-label">Tipe Akun</div>
                <div class="info-value" th:text="${userRole.contains('ADMIN') ? 'Full Access' : 'Limited Access'}">Status</div>
            </div>
        </div>
    </div>

    <div class="history-section" th:if="${!riwayat.empty}">
        <h3 style="font-size: 18px; margin-bottom: 15px;">Aktivitas Presensi Terakhir</h3>
        <table class="history-table">
            <thead>
            <tr>
                <th>Tanggal</th>
                <th>Jam</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${riwayat}">
                <td th:text="${#temporals.format(a.waktuMasuk, 'dd MMM yyyy')}"></td>
                <td th:text="${#temporals.format(a.waktuMasuk, 'HH:mm')}"></td>
                <td>
                    <span th:text="${a.status}" th:style="${a.status == 'HADIR' ? 'color: #2ec4b6' : 'color: #6f42c1'}" style="font-weight: 700;"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
